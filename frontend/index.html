<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <title>Chhoto URL</title>

    <meta
      name="description"
      content="A simple selfhosted URL shortener with no unnecessary features."
    />
    <meta property="og:title" content="Chhoto URL" />
    <meta
      property="og:description"
      content="A simple selfhosted URL shortener with no unnecessary features."
    />

    <meta
      name="keywords"
      content="url shortener, link shortener, self hosted, open source"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="assets/favicon.ico"
      sizes="any"
    />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      href="assets/favicon-32.png"
      sizes="32x32"
    />
    <link
      rel="icon"
      type="image/png"
      href="assets/favicon-196.png"
      sizes="196x196"
    />

    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script
      src="https://cdn.jsdelivr.net/gh/sintan1729/qrcodejs@0.1.0/qrcode.min.js"
      async
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/punycode-okam@1.4.1/punycode.min.js"
      async
    ></script>
    <script src="static/script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css"
      integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      type="text/css"
      target="_blank"
      href="static/styles.css"
    />
  </head>

  <body>
    <div class="container" id="container">
      <form class="pure-form pure-form-aligned" name="new-url-form">
        <fieldset>
          <legend id="logo">
            <img src="assets/favicon.svg" alt="chhoto-url-logo" /> Chhoto URL
          </legend>
          <div class="pure-control-group">
            <label for="longUrl">Long URL</label>
            <input
              class="chhoto-input"
              type="url"
              name="longUrl"
              id="longUrl"
              placeholder="Please enter a valid URL"
              required
            />
          </div>
          <div class="pure-control-group">
            <label for="shortUrl">Short URL (optional)</label>
            <input
              class="chhoto-input"
              type="text"
              name="shortUrl"
              id="shortUrl"
              placeholder="Only a-z, 0-9, - and _ are allowed"
              pattern="[a-z0-9\-_]+"
              title="Only a-z, 0-9, - and _ are allowed"
              autocapitalize="off"
            />
          </div>
          <div class="pure-form-section">
            <details class="chhoto-input" id="optionsSection">
              <summary class="pure-controls">More options</summary>
              <div class="pure-control-group">
                <label for="expiryDelay">Expiry</label>
                <select
                  class="chhoto-select"
                  name="expiryDelay"
                  id="expiryDelay"
                >
                  <option value="0">Never</option>
                  <option value="600">10 Minutes</option>
                  <option value="1800">30 Minutes</option>
                  <option value="3600">1 Hour</option>
                  <option value="43200">12 Hours</option>
                  <option value="86400">1 Day</option>
                  <option value="604800">1 Week</option>
                  <option value="2592000">1 Month</option>
                  <option value="7776000">3 Months</option>
                  <option value="15552000">6 Months</option>
                  <option value="31536000">1 Year</option>
                </select>
              </div>
              <div class="pure-control-group">
                <label for="notes">Notes</label>
                <input
                  class="chhoto-input"
                  type="text"
                  name="notes"
                  id="notes"
                  placeholder="Notes for the link, used for filtering"
                  pattern="[\x20-\x7E]*"
                  title="Only printable ASCII characters are allowed"
                  autocapitalize="off"
                />
              </div>
            </details>
          </div>
          <div class="pure-controls" id="controls">
            <button class="chhoto-button pure-button pure-button-primary">
              Shorten!
            </button>
            <div id="alert-box">&nbsp;</div>
          </div>
        </fieldset>
      </form>

      <p id="loading-text">Loading links table...</p>
      <table class="chhoto-table pure-table" id="table-box" hidden>
        <caption>
          <span name="label">Active links</span>
          <span id="pageControls" hidden="true">
            <button
              id="prevPageBtn"
              class="svg-button"
              title="Previous Page"
            ></button>
            <button
              id="nextPageBtn"
              class="svg-button"
              title="Next Page"
            ></button>
          </span>
          <div id="filter-div">
            <form class="pure-form" name="filter-form">
              <fieldset>
                <input
                  class="chhoto-input"
                  type="text"
                  name="filter"
                  id="filterText"
                  placeholder="Filter shortlinks"
                  pattern="^$|(?=(?:.*[A-Za-z0-9]){3,})[\x20-\x7E]+$"
                  title="Only printable ASCII is allowed, min length 3 chars"
                  autocapitalize="off"
                />
                <button class="chhoto-button pure-button pure-button-primary">
                  Filter
                </button>
              </fieldset>
            </form>
          </div>
        </caption>
        <br />
        <thead>
          <tr>
            <th name="numColumn">#</th>
            <th id="short-url-header">Short URL</th>
            <th>Long URL</th>
            <th name="hitsColumn">Hits</th>
            <th name="expiryColumn">Expiry</th>
            <th name="actions">Actions</th>
          </tr>
        </thead>
        <tbody id="url-table">
          <!-- The links would be inserted here -->
        </tbody>
      </table>
    </div>

    <div name="links-div">
      <button class="linkButton" id="admin-button" hidden>
        <!-- https://svgicons.com/icon/109760/account -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
        >
          <title>Account SVG Icon</title>
          <g
            fill="none"
            stroke="currentColor"
            stroke-dasharray="28"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
          >
            <path
              d="M4 21v-1c0 -3.31 2.69 -6 6 -6h4c3.31 0 6 2.69 6 6v1"
            ></path>
            <path
              d="M12 11c-2.21 0 -4 -1.79 -4 -4c0 -2.21 1.79 -4 4 -4c2.21 0 4 1.79 4 4c0 2.21 -1.79 4 -4 4Z"
            ></path>
          </g>
        </svg>
        <span>login</span>
      </button>
      <!-- https://svgicons.com/icon/13641/bxl-github -->
      <a
        id="version-number"
        class="linkButton"
        href="https://github.com/SinTan1729/chhoto-url"
        target="_blank"
        rel="noopener noreferrer"
        hidden
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
        >
          <path
            fill-rule="evenodd"
            clip-rule="evenodd"
            d="M12.026 2c-5.509 0-9.974 4.465-9.974 9.974c0 4.406 2.857 8.145 6.821 9.465
            c.499.09.679-.217.679-.481c0-.237-.008-.865-.011-1.696c-2.775.602-3.361-1.338-3.361-1.338
            c-.452-1.152-1.107-1.459-1.107-1.459c-.905-.619.069-.605.069-.605c1.002.07 1.527 1.028 1.527 1.028
            c.89 1.524 2.336 1.084 2.902.829c.091-.645.351-1.085.635-1.334c-2.214-.251-4.542-1.107-4.542-4.93
            c0-1.087.389-1.979 1.024-2.675c-.101-.253-.446-1.268.099-2.64c0 0 .837-.269 2.742 1.021
            a9.582 9.582 0 0 1 2.496-.336a9.554 9.554 0 0 1 2.496.336c1.906-1.291 2.742-1.021 2.742-1.021
            c.545 1.372.203 2.387.099 2.64c.64.696 1.024 1.587 1.024 2.675c0 3.833-2.33 4.675-4.552 4.922
            c.355.308.675.916.675 1.846c0 1.334-.012 2.41-.012 2.737c0 .267.178.577.687.479
            C19.146 20.115 22 16.379 22 11.974C22 6.465 17.535 2 12.026 2z"
            fill="currentColor"
          />
        </svg>
        <span>Source Code</span>
      </a>
    </div>

    <dialog id="login-dialog" closedby="none" class="chhoto-dialog">
      <form class="pure-form" name="login-form">
        <p>Please enter password to access this website</p>
        <div>
          <input class="chhoto-input" type="password" id="password" />
          <button
            type="button"
            id="password-eye-button"
            title="Toggle Password Visibility"
          >
            &#x1F441;
          </button>
        </div>
        <button
          class="chhoto-button pure-button pure-button-primary"
          value="default"
        >
          Log in
        </button>
        <p id="wrong-pass" hidden>Wrong password!</p>
      </form>
    </dialog>

    <dialog id="edit-dialog" class="chhoto-dialog">
      <form class="pure-form pure-form-aligned" name="edit-form">
        <p>
          Enter new details for <span id="edit-link">placeholder</span>. <br />
          Be careful. It cannot be undone.
        </p>
        <fieldset>
          <div class="pure-control-group">
            <label for="edited-url">Long URL</label>
            <input class="chhoto-input" type="url" id="edited-url" />
          </div>
          <div class="pure-control-group">
            <label for="edited-notes">Notes</label>
            <input
              class="chhoto-input"
              type="text"
              pattern="[\x20-\x7E]*"
              id="edited-notes"
            />
          </div>
          <div class="pure-control-group">
            <label for="edited-expiry">Expiry</label>
            <input
              class="chhoto-input"
              type="datetime-local"
              step="1"
              id="edited-expiry"
            />
          </div>
          <label for="edit-checkbox">
            <input type="checkbox" id="edit-checkbox" checked="unchecked" />
            Reset hit count
          </label>
          <div id="edit-buttons">
            <button
              class="chhoto-button pure-button pure-button-primary"
              id="edit-cancel-button"
              type="button"
            >
              Cancel
            </button>
            <button
              class="chhoto-button pure-button pure-button-primary"
              value="default"
            >
              Submit
            </button>
          </div>
        </fieldset>
      </form>
    </dialog>

    <dialog id="info-dialog" closedby="any" class="chhoto-dialog">
      <!-- https://svgicons.com/icon/13141/cross-filled -->
      <button class="dialog-close-button" id="info-close-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
        >
          <g fill="currentColor" fill-rule="evenodd" clip-rule="evenodd">
            <path
              d="M5.47 5.47a.75.75 0 0 1 1.06 0l12 12a.75.75 0 1 1-1.06 1.06l-12-12a.75.75 0 0 1 0-1.06"
            />
            <path
              d="M18.53 5.47a.75.75 0 0 1 0 1.06l-12 12a.75.75 0 0 1-1.06-1.06l12-12a.75.75 0 0 1 1.06 0"
            />
          </g>
        </svg>
      </button>
      <div id="info-div">
        <table class="pure-table" id="info-table">
          <tbody>
            <tr>
              <td class="label">Short:</td>
              <td id="info-short"></td>
            </tr>
            <tr>
              <td class="label">Long:</td>
              <td id="info-long"></td>
            </tr>
            <tr>
              <td class="label">Hits:</td>
              <td id="info-hits"></td>
            </tr>
            <tr>
              <td class="label">Expiry:</td>
              <td id="info-expiry"></td>
            </tr>
            <tr>
              <td class="label">Notes:</td>
              <td id="info-notes"></td>
            </tr>
          </tbody>
        </table>
      </div>
    </dialog>

    <dialog id="qr-code-dialog" closedby="any" class="chhoto-dialog">
      <!-- https://svgicons.com/icon/10667/download-solid -->
      <a class="dialog-close-button" id="qr-download-button" href="">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
        >
          <path
            fill="currentColor"
            fill-rule="evenodd"
            d="M5 16.25a.75.75 0 0 1 .75.75v2c0 .138.112.25.25.25h12a.25.25 0 0 0 .25-.25v-2a.75.75 0 0 1 1.5 0v2A1.75 1.75 0 0 1 18 20.75H6A1.75 1.75 0 0 1 4.25 19v-2a.75.75 0 0 1 .75-.75"
            clip-rule="evenodd"
          />
          <path
            fill="currentColor"
            d="M10.738 3.75a.992.992 0 0 0-.988.906a36.618 36.618 0 0 0-.082 5.27c-.247.013-.493.03-.74.047l-1.49.109a.76.76 0 0 0-.585 1.167a15.555 15.555 0 0 0 4.032 4.258l.597.429a.888.888 0 0 0 1.036 0l.597-.429a15.556 15.556 0 0 0 4.032-4.258a.76.76 0 0 0-.585-1.167l-1.49-.109a42.274 42.274 0 0 0-.74-.047a36.62 36.62 0 0 0-.081-5.27a.992.992 0 0 0-.989-.906z"
          />
        </svg>
      </a>
      <!-- https://svgicons.com/icon/13141/cross-filled -->
      <button class="dialog-close-button" id="qr-close-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
        >
          <g fill="currentColor" fill-rule="evenodd" clip-rule="evenodd">
            <path
              d="M5.47 5.47a.75.75 0 0 1 1.06 0l12 12a.75.75 0 1 1-1.06 1.06l-12-12a.75.75 0 0 1 0-1.06"
            />
            <path
              d="M18.53 5.47a.75.75 0 0 1 0 1.06l-12 12a.75.75 0 0 1-1.06-1.06l12-12a.75.75 0 0 1 1.06 0"
            />
          </g>
        </svg>
      </button>
      <div id="qr-code"></div>
    </dialog>
  </body>
</html>
